<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Recognition Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
    <section id="statusCard" class="rounded-lg bg-slate-700 p-8 text-white shadow-sm transition-colors">
      <p class="text-sm font-semibold uppercase tracking-wide text-white/75">Current detection</p>
      <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <h1 id="currentName" class="break-words text-5xl font-bold tracking-normal sm:text-7xl">Waiting...</h1>
        <p id="currentStatus" class="text-2xl font-semibold text-white/90">No signal</p>
      </div>
    </section>

    <section id="cameraStream" class="overflow-hidden rounded-lg bg-white shadow-sm">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
        <h2 class="text-xl font-semibold">Camera Stream</h2>
        <span data-camera-state class="inline-flex rounded-full bg-slate-200 px-3 py-1 text-sm font-semibold text-slate-600">Connecting</span>
      </div>
      <div class="relative aspect-video bg-slate-200">
        <img data-camera-img class="hidden h-full w-full object-cover" alt="Live annotated camera stream">
        <div data-camera-placeholder class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-slate-300 border-t-slate-600"></div>
          <p class="mt-3 font-medium text-slate-600">Connecting to camera...</p>
        </div>
      </div>
      <div class="flex justify-end border-t border-slate-200 px-5 py-3">
        <button data-camera-reconnect type="button" class="hidden rounded-md bg-slate-700 px-4 py-2 font-semibold text-white hover:bg-slate-800">
          Reconnect
        </button>
      </div>
    </section>

    <section class="overflow-hidden rounded-lg bg-white shadow-sm">
      <div class="border-b border-slate-200 px-5 py-4">
        <h2 class="text-xl font-semibold">Recognition Log</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full min-w-[520px] text-left">
          <thead class="bg-slate-50 text-sm uppercase text-slate-500">
            <tr>
              <th class="px-5 py-3 font-semibold">Time</th>
              <th class="px-5 py-3 font-semibold">Name</th>
              <th class="px-5 py-3 font-semibold">Status</th>
            </tr>
          </thead>
          <tbody id="logBody" class="divide-y divide-slate-200 text-base">
            <tr>
              <td colspan="3" class="px-5 py-8 text-center text-slate-500">Waiting for face events...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    window.CAMERA_WS_URL = {{ ws_url|tojson }};
    const socket = io();
    const statusCard = document.getElementById("statusCard");
    const currentName = document.getElementById("currentName");
    const currentStatus = document.getElementById("currentStatus");
    const logBody = document.getElementById("logBody");
    let events = [];

    function isRecognized(event) {
      return event.name && event.name.toUpperCase() !== "UNKNOWN";
    }

    function statusText(event) {
      return isRecognized(event) ? "Recognized" : "Unknown";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function updateStatus(event) {
      currentName.textContent = event.name;
      currentStatus.textContent = statusText(event);
      statusCard.className = "rounded-lg p-8 text-white shadow-sm transition-colors " +
        (isRecognized(event) ? "bg-emerald-600" : "bg-red-600");
    }

    function renderLog() {
      if (events.length === 0) {
        logBody.innerHTML = '<tr><td colspan="3" class="px-5 py-8 text-center text-slate-500">Waiting for face events...</td></tr>';
        return;
      }

      logBody.innerHTML = events.map((event) => {
        const recognized = isRecognized(event);
        const badgeClass = recognized ? "bg-emerald-100 text-emerald-700" : "bg-red-100 text-red-700";
        const timestamp = escapeHtml(event.timestamp);
        const name = escapeHtml(event.name);
        return `
          <tr class="bg-white">
            <td class="px-5 py-4 font-medium text-slate-700">${timestamp}</td>
            <td class="px-5 py-4 font-semibold">${name}</td>
            <td class="px-5 py-4">
              <span class="inline-flex rounded-full px-3 py-1 text-sm font-semibold ${badgeClass}">
                ${statusText(event)}
              </span>
            </td>
          </tr>
        `;
      }).join("");
    }

    socket.on("face_log", (log) => {
      events = log || [];
      if (events.length > 0) {
        updateStatus(events[0]);
      }
      renderLog();
    });

    socket.on("face_event", (event) => {
      events.unshift(event);
      events = events.slice(0, 50);
      updateStatus(event);
      renderLog();
    });
  </script>
  <script src="{{ url_for('static', filename='camera_stream.js') }}"></script>
</body>
</html>
