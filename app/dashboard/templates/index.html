<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Recognition Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    .dashboard {
      display: grid;
      grid-template-columns: 7fr 3fr;
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      gap: 1rem;
      padding: 1rem;
      box-sizing: border-box;
    }
    .panel-detection  { grid-column: 1; grid-row: 1; }
    .panel-camera     { grid-column: 1; grid-row: 2; }
    .panel-register   { grid-column: 2; grid-row: 1; }
    .panel-log        { grid-column: 2; grid-row: 2; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <main class="dashboard">
    
    <!-- 1. Camera stream -->
    <section id="cameraStream" class="panel-camera overflow-hidden rounded-lg bg-white shadow-sm flex flex-col h-full">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4 shrink-0">
        <h2 class="text-xl font-semibold">Camera Stream</h2>
        <span data-camera-state class="inline-flex rounded-full bg-slate-200 px-3 py-1 text-sm font-semibold text-slate-600">Connecting</span>
      </div>
      <div class="relative flex-1 bg-slate-200">
        <img data-camera-img class="hidden h-full w-full object-cover" alt="Live annotated camera stream">
        <div data-camera-placeholder class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-slate-300 border-t-slate-600"></div>
          <p class="mt-3 font-medium text-slate-600">Connecting to camera...</p>
        </div>
      </div>
      <div class="flex justify-end border-t border-slate-200 px-5 py-3">
        <button data-camera-reconnect type="button" class="hidden rounded-md bg-slate-700 px-4 py-2 font-semibold text-white hover:bg-slate-800">
          Reconnect
        </button>
      </div>
    </section>

    <!-- 2. Current detection result -->
    <section id="statusCard" class="panel-detection rounded-lg bg-slate-700 p-8 text-white shadow-sm transition-colors flex flex-col justify-center h-full">
      <p class="text-sm font-semibold uppercase tracking-wide text-white/75">Current detection</p>
      <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <h1 id="currentName" class="break-words text-5xl font-bold tracking-normal sm:text-7xl">Waiting...</h1>
        <p id="currentStatus" class="text-2xl font-semibold text-white/90">No signal</p>
      </div>
    </section>

    <!-- 3. Register new face -->
    <section id="faceRegister" class="panel-register overflow-hidden rounded-lg bg-white shadow-sm flex flex-col h-full">
      <div class="border-b border-slate-200 px-5 py-4 shrink-0">
        <h2 class="text-xl font-semibold">Register New Face</h2>
      </div>
      <div class="p-5 overflow-y-auto flex-1">
        <form id="registerForm" class="flex flex-col gap-4">
          <div>
            <label for="registerName" class="block text-sm font-medium text-slate-700">Person's name</label>
            <input type="text" id="registerName" name="name" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-slate-500 focus:ring-slate-500 sm:text-sm border p-2">
          </div>
          <div>
            <label for="registerImage" class="block text-sm font-medium text-slate-700">Upload face photo</label>
            <input type="file" id="registerImage" name="image" accept="image/*" required class="mt-1 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-slate-50 file:text-slate-700 hover:file:bg-slate-100">
          </div>
          <div id="imagePreviewContainer" class="hidden">
            <p class="text-sm font-medium text-slate-700 mb-2">Preview</p>
            <img id="imagePreview" class="h-48 w-48 object-cover rounded-md border border-slate-200" alt="Preview">
          </div>
          <div id="registerMessage" class="hidden text-sm font-medium p-3 rounded-md"></div>
          <div>
            <button type="submit" id="registerSubmit" class="inline-flex justify-center rounded-md border border-transparent bg-slate-700 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 disabled:opacity-50">
              Register
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- 4. YoloBit board log -->
    <section id="yoloBitLog" class="panel-log overflow-hidden rounded-lg bg-white shadow-sm flex flex-col h-full">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4 shrink-0">
        <h2 class="text-xl font-semibold">YoloBit Board Log</h2>
        <div class="flex items-center gap-3">
          <span id="serialState" class="inline-flex rounded-full bg-slate-200 px-3 py-1 text-sm font-semibold text-slate-600"><span class="animate-pulse">_</span> Connecting to board...</span>
          <button id="serialReconnect" type="button" class="hidden rounded-md bg-slate-700 px-3 py-1 text-sm font-semibold text-white hover:bg-slate-800">Reconnect</button>
        </div>
      </div>
      <div id="serialLogContainer" class="p-4 font-mono text-sm overflow-y-auto flex-1 bg-[#0d1117]" style="font-family: 'Courier New', monospace;">
      </div>
    </section>

  </main>

  <script>
    window.CAMERA_WS_URL = {{ ws_url|tojson }};
    window.API_URL = {{ api_url|tojson }};
    const socket = io();
    const statusCard = document.getElementById("statusCard");
    const currentName = document.getElementById("currentName");
    const currentStatus = document.getElementById("currentStatus");

    function isRecognized(event) {
      return event.name && event.name.toUpperCase() !== "UNKNOWN";
    }

    function statusText(event) {
      return isRecognized(event) ? "Recognized" : "Unknown";
    }

    function updateStatus(event) {
      currentName.textContent = event.name;
      currentStatus.textContent = statusText(event);
      statusCard.className = "panel-detection rounded-lg p-8 text-white shadow-sm transition-colors flex flex-col justify-center h-full " +
        (isRecognized(event) ? "bg-emerald-600" : "bg-red-600");
    }

    socket.on("face_log", (log) => {
      if (log && log.length > 0) {
        updateStatus(log[0]);
      }
    });

    socket.on("face_event", (event) => {
      updateStatus(event);
    });
  </script>
  <script src="{{ url_for('static', filename='camera_stream.js') }}"></script>
  <script src="{{ url_for('static', filename='face_register.js') }}"></script>
  <script src="{{ url_for('static', filename='board_log.js') }}"></script>
</body>
</html>
